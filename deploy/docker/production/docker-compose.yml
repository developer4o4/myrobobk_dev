
services:
 db:
  image: postgres:16
  environment:
   POSTGRES_DB: myapp
   POSTGRES_USER: myapp
   POSTGRES_PASSWORD: myapp

 web:
  build: ../../../backend
  command: gunicorn config.wsgi:application --bind 0.0.0.0:7712
  depends_on: [db]

 nginx:
  image: nginx:alpine
  ports: ["80:80"]
  volumes:
   - ../../nginx/default.conf:/etc/nginx/conf.d/default.conf
  depends_on: [web]
