services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["--host=tcp://0.0.0.0:2375", "--storage-driver=overlay2"]
    ports:
      - "2375:2375"
    volumes:
      - dind_data:/var/lib/docker
      - judge_runs:/judge_runs
    restart: unless-stopped
  web:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:7712
    env_file:
      - ../../../.env
    volumes:
      - ../../../backend:/app
      - judge_runs:/judge_runs
    ports:
      - "7712:7712"
    depends_on:
      - db
      - dind

  bot:
    build:
      context: ../../../bot
      dockerfile: Dockerfile
    env_file:
      - ../../../.env
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  dind_data:
  judge_runs: